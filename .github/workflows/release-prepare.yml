name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Base branch (main or tag)"
        default: 'main'
        required: true
      version:
        description: "Release version (e.g. 0.7.1, 0.7.0-rc.1)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: release
          path: release-repo

      - name: Set GitHub Actions bot identity
        run: |
          cd release-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_branch }}
          path: source-repo

      - name: Create staging branch
        run: |
          cd release-repo
          git checkout -b ${{ vars.RELEASE_STAGING_BRANCH_STEM }}${{ inputs.version }}

      - name: Copy release changes to release repo
        run: |
          rsync -avW --delete --exclude='.git' source-repo/ release-repo/

      - name: Commit changes
        run: |
          cd release-repo

          git add -A
          git commit -m "Changes to update the codebase to release v${{ inputs.version }}."

      - name: Push branch
        run: |
          cd release-repo
          git push origin ${{ vars.RELEASE_STAGING_BRANCH_STEM }}${{ inputs.version }}

  generate_changelog:
    needs: prepare
    uses: ./.github/workflows/release-changelog.yml
    with:
      changelog_branch: ${{ vars.RELEASE_STAGING_BRANCH_STEM }}${{ inputs.version }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  set_version:
    needs: generate_changelog
    uses: ./.github/workflows/set-version.yml
    with:
      target_branch: ${{ vars.RELEASE_STAGING_BRANCH_STEM }}${{ inputs.version }}
      version: ${{ inputs.version }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  open_pr:
    runs-on: ubuntu-latest
    needs: set_version
    steps:
      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Automated release PR for v${{ inputs.version }}." > pr_body.txt
          echo "" >> pr_body.txt
          echo "**Do not** merge this PR, it is only for review and testing." >> pr_body.txt
          echo "The release process will deal with it when the release is finalised." >> pr_body.txt

          gh pr create \
            --base release \
            --head ${{ vars.RELEASE_STAGING_BRANCH_STEM }}${{ inputs.version }} \
            --title "Proposed changes to create release v${{ inputs.version }} of libCellML" \
            --body-file pr_body.txt \
            --draft        

  delete_release_branch:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - generate_changelog
      - set_version
      - open_pr
    if: failure()

    steps:
      - uses: actions/checkout@v6

      - name: Delete remote release staging branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${{ vars.RELEASE_STAGING_BRANCH_STEM }}${{ inputs.version }}"
          echo "Cleaning up failed release branch: $branch"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git push origin --delete "$branch" || echo "Branch already deleted"
