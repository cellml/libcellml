name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Base branch (main or tag)"
        required: true
      version:
        description: "Release version (e.g. 0.7.1)"
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_branch }}

      - name: Create staging branch
        run: |
          git checkout -b release-staging-v${{ inputs.version }}

      - name: Update version numbers
        run: |
          version=${{ inputs.version }}
          core=$(sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/' <<< "$version")
          dev="${version#"$core"}"
          echo "Core version: $core, Dev suffix: $dev"
          python3 .github/scripts/set_version.py . $core $dev

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "Prepare release v${{ inputs.version }}"

      - name: Push branch
        run: git push origin HEAD

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          base: release
          head: release-staging-v${{ inputs.version }}
          title: "Release v${{ inputs.version }}"
          body: |
            Automated release PR for v${{ inputs.version }}
