name: Release (stage 04) - Finalise

on:
  push:
    branches:
      - main2
  workflow_dispatch:

permissions:
  contents: write

jobs:
  determine_release:
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.find_branch.outputs.release_branch }}
      release_version: ${{ steps.find_branch.outputs.release_version }}
      pr_number: ${{ steps.find_pr.outputs.pr_number }}
      metadata_b64: ${{ steps.extract_metadata.outputs.metadata_b64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Determine release staging branch
        id: find_branch
        run: |
          git remote set-branches origin '*'
          git fetch -v --depth=1

          branch=$(git branch -r \
            | grep 'origin/${{ vars.RELEASE_STAGING_BRANCH_STEM }}' \
            | sed 's|[ \t]*origin/||' \
            | sort -V \
            | tail -1)

          if [ -z "$branch" ]; then
            echo "::error::No release staging branch found"
            exit 1
          fi

          echo "release_branch=$branch" >> "$GITHUB_OUTPUT"
          tag="${branch#${{ vars.RELEASE_STAGING_BRANCH_STEM }}}"
          echo "release_version=v$tag" >> "$GITHUB_OUTPUT"

      - name: Determine PR number
        id: find_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="${{ steps.find_branch.outputs.release_branch }}"

          pr_number=$(gh pr list \
            --head "$branch" \
            --base release \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$pr_number" ]; then
            echo "::error::No PR found for branch $branch"
            exit 1
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: extract_metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="${{ steps.find_pr.outputs.pr_number }}"

          metadata=$(gh pr view "$pr_number" --json comments --jq '.comments[].body' | sed -n '/```json/,/```/p' | sed '1d;$d')

          if [ -z "$metadata" ]; then
            echo "::error::No metadata found in PR #$pr_number"
            exit 1
          fi

          encoded=$(echo "$metadata" | base64 -w 0)

          echo "metadata_b64=$encoded" >> "$GITHUB_OUTPUT"

          echo "Extracted metadata: $metadata"

  prepare_documentation:
    runs-on: ubuntu-latest
    needs: determine_release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine_release.outputs.release_version }}
          path: libcellml

      - name: Extract documentation metadata
        id: extract_doc_metadata
        run: |
          metadata_b64="${{ needs.determine_release.outputs.metadata_b64 }}"
          metadata=$(echo "$metadata_b64" | base64 -d)
          echo "$metadata"

          database_repo=$(echo "$metadata" | jq -r '.database_repo')
          database_sha=$(echo "$metadata" | jq -r '.database_sha')

          echo "database_repo=$database_repo" >> "$GITHUB_OUTPUT"
          echo "database_sha=$database_sha" >> "$GITHUB_OUTPUT"

          passed_tests=$(echo "$metadata" | jq -r '.test_summary | to_entries | map(select(.key != "total_failed" and .value.failed == 0)) | map(.key)')
          encoded=$(echo "$passed_tests" | base64 -w 0)
          echo "passed_tests_b64=$encoded" >> "$GITHUB_OUTPUT"

          echo "Database repo.: $database_repo"
          echo "Database SHA: $database_sha"
          echo "Passed tests: $passed_tests"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.extract_doc_metadata.outputs.database_repo }}
          ref: ${{ steps.extract_doc_metadata.outputs.database_sha }}
          path: database

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main2
          path: main2

      - name: Prepare documentation
        run: |
          passed_tests=$(echo "${{ steps.extract_doc_metadata.outputs.passed_tests_b64 }}" | base64 -d)
          echo "Preparing documentation for release ${{ needs.determine_release.outputs.release_version }} with database at ${{ steps.extract_doc_metadata.outputs.database_sha }} and passed tests: $passed_tests"
          echo "yes"
          ls main2/.github/scripts
          mkdir docs
          echo '$passed_tests' | jq -r '.[]' | while read test; do
            echo "Processing test: $test"
            repo=$(python main2/github/scripts/get_test_suite_definition_info.py repo "database/$test")
            branch=$(python main2/github/scripts/get_test_suite_definition_info.py branch "database/$test")
            git clone --depth 1 --branch "$branch" "https://github.com/$repo.git" "docs/$test"
          done

          ls docs



