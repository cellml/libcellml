name: Check Release

on:
  workflow_dispatch:

jobs:
  determine_release:
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.find_branch.outputs.release_branch }}
      pr_number: ${{ steps.find_pr.outputs.pr_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Determine release staging branch
        id: find_branch
        run: |
          git remote set-branches origin '*'
          git fetch -v --depth=1

          branch=$(git branch -r \
            | grep 'origin/${{ vars.RELEASE_STAGING_BRANCH_STEM }}' \
            | sed 's|[ \t]*origin/||' \
            | sort -V \
            | tail -1)

          if [ -z "$branch" ]; then
            echo "::error::No release staging branch found"
            exit 1
          fi

          echo "release_branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Determine PR number
        id: find_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch=${{ steps.find_branch.outputs.release_branch }}

          pr_number=$(gh pr list \
            --head "$branch" \
            --base release \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$pr_number" ]; then
            echo "::error::No open PR found for branch $branch"
            exit 1
          fi

          echo "Found PR: #$pr_number"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

  run_ci:
    needs: determine_release
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ needs.determine_release.outputs.release_branch }}
    permissions:
      contents: read

  ci_comment:
    needs:
      - run_ci
      - determine_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine_release.outputs.release_branch }}

      - name: Post CI results comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "CI results summary:"
          echo "${{ needs.determine_release.outputs.release_branch }} (PR #${{ needs.determine_release.outputs.pr_number }})"

          pr_number=${{ needs.determine_release.outputs.pr_number }}

          if [ "${{ needs.run_ci.result }}" == "success" ]; then
            comment="✅ CI checks passed successfully."
          else
            comment="❌ CI checks failed. This release requires changes, delete this PR and branch, fix the problems and try again."
          fi

          gh pr comment "$pr_number" --body "$comment"

  documentation_checks:
    needs: ci_comment
    runs-on: ubuntu-latest
    steps:
      - run: echo "Run additional release validation here"
