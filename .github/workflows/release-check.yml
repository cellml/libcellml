name: Check Release

on:
  workflow_dispatch:
    inputs:
      end_to_end_test_repo:
        description: "Repository containing end-to-end tests (e.g. user/repo)"
        default: 'libcellml/end-to-end-test-framework'
        required: true
        type: string
      end_to_end_test_tag:
        description: "Tag of the end-to-end test repository to use (e.g. v1.0.0, ${{ vars.DEFAULT_END_TO_END_TEST_TAG }})"
        default: 'v0.4.0'
        required: true
        type: string
      database_repo:
        description: "Database to use for end-to-end tests (e.g. user/database)"
        default: 'libcellml/libcellml.org-documentation-test-database'
        required: true
        type: string
      database_tag:
        description: "Tag of the database repository to use (e.g. v1.0.0)"
        default: 'v0.3.4'
        required: true
        type: string

jobs:
  determine_release:
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.find_branch.outputs.release_branch }}
      pr_number: ${{ steps.find_pr.outputs.pr_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Determine release staging branch
        id: find_branch
        run: |
          git remote set-branches origin '*'
          git fetch -v --depth=1

          branch=$(git branch -r \
            | grep 'origin/${{ vars.RELEASE_STAGING_BRANCH_STEM }}' \
            | sed 's|[ \t]*origin/||' \
            | sort -V \
            | tail -1)

          if [ -z "$branch" ]; then
            echo "::error::No release staging branch found"
            exit 1
          fi

          echo "release_branch=$branch" >> "$GITHUB_OUTPUT"
          tag="${branch#${{ vars.RELEASE_STAGING_BRANCH_STEM }}}"
          echo "release_version=$tag" >> "$GITHUB_OUTPUT"

      - name: Determine PR number
        id: find_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch=${{ steps.find_branch.outputs.release_branch }}

          pr_number=$(gh pr list \
            --head "$branch" \
            --base release \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$pr_number" ]; then
            echo "::error::No open PR found for branch $branch"
            exit 1
          fi

          echo "Found PR: #$pr_number"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

  run_ci:
    needs: determine_release
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ needs.determine_release.outputs.release_branch }}
    permissions:
      contents: read

  ci_comment:
    needs:
      - run_ci
      - determine_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine_release.outputs.release_branch }}

      - name: Post CI results comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "CI results summary:"
          echo "${{ needs.determine_release.outputs.release_branch }} (PR #${{ needs.determine_release.outputs.pr_number }})"

          pr_number=${{ needs.determine_release.outputs.pr_number }}

          if [ "${{ needs.run_ci.result }}" == "success" ]; then
            comment="##Unit Tests\n\n✅ CI checks passed successfully."
          else
            comment="##Unit Tests\n\n❌ CI checks failed. This release requires changes, delete this PR and branch, fix the problems and try again."
          fi

          gh pr comment "$pr_number" --body "$comment"

  documentation_checks:
    needs:
      - ci_comment
      - determine_release
    uses: ./.github/workflows/end-2-end.yml
    with:
      ref: ${{ vars.RELEASE_STAGING_BRANCH_STEM }}${{ inputs.version }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  documentation_comment:
    needs:
      - documentation_checks
      - determine_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine_release.outputs.release_branch }}

      - name: Post documentation checks comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number=${{ needs.determine_release.outputs.pr_number }}

          if [ "${{ needs.documentation_checks.result }}" == "success" ]; then
            comment="##Documentation Tests\n\n✅ Documentation checks passed successfully."
          else
            comment="##Documentation Tests\n\n❌ Documentation checks failed. The tested documentation tests do not work with this version of libCellML."
          fi

          gh pr comment "$pr_number" --body "$comment"
